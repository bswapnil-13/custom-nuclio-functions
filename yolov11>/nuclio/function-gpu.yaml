# GPU variant: for dashboard deploy, copy this file to function.yaml in your zip.
metadata:
  name: generic-yolov11-gpu
  namespace: cvat
  annotations:
    name: Generic YOLOv11 detect (GPU)
    type: detector
    framework: pytorch
    spec: |
      [
        { "id": 0, "name": "class_a" },
        { "id": 1, "name": "class_b" }
      ]

spec:
  runtime: "python:3.11"
  handler: main:handler
  eventTimeout: 30s
  description: "Configurable YOLO detection → CVAT rectangles (GPU). Replace metadata.annotations.spec with your class names."

  build:
    image: cvat.pth.ultralytics.generic-yolov11-gpu
    baseImage: python:3.11-slim
    directives:
      preCopy:
        - kind: USER
          value: root
        - kind: RUN
          value: apt-get update && apt-get install --no-install-recommends -y libglib2.0-0 libgl1 libsm6 libxext6 libxrender1 && rm -rf /var/lib/apt/lists/*
        - kind: RUN
          value: pip install --no-cache-dir torch torchvision --index-url https://download.pytorch.org/whl/cu124
        - kind: RUN
          value: pip install --no-cache-dir ultralytics numpy pillow
        - kind: WORKDIR
          value: /opt/nuclio

    copy:
      - src: ./weights/best.pt
        dest: /opt/nuclio/weights/best.pt

  env:
    - name: MODEL_PATH
      value: "/opt/nuclio/weights/best.pt"
    - name: DEVICE
      value: "auto"
    # Optional: e.g. detect — omit to let Ultralytics infer from the checkpoint
    # - name: YOLO_TASK
    #   value: "detect"
    - name: BOX_CONF_THRESHOLD
      value: "0.3"
    - name: POST_NMS
      value: "1"
    - name: NMS_IOU_THRESHOLD
      value: "0.4"
    - name: PYTHONUNBUFFERED
      value: "1"

  triggers:
    myHttpTrigger:
      maxWorkers: 1
      kind: "http"
      workerAvailabilityTimeoutMilliseconds: 10000
      attributes:
        maxRequestBodySize: 33554432

  resources:
    limits:
      nvidia.com/gpu: 1

  platform:
    attributes:
      restartPolicy:
        name: always
        maximumRetryCount: 3
      mountMode: volume
      network: cvat_cvat
